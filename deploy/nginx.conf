server {
    listen 80;
    server_name carrental.sandshotel.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name carrental.sandshotel.us;

    ssl_certificate /etc/letsencrypt/live/carrental.sandshotel.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carrental.sandshotel.us/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /opt/hotel-carrental/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
